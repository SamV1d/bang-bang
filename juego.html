<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bang Bang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sancreek&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
    <div class="bg-transicion bg-transicion-show"></div>

    <!-- Pantalla de ganador final -->
    <div class="ganador" style="display:none;">
        <div class="personajeGanador">
            <h1>GANADOR <span id="nombreGanador"></span></h1>
            <img id="imgGanador" src="">
            <button onclick="restart()" class="restart">VOLVER A JUGAR</button>
        </div>
    </div>

    <!-- Escenario de juego -->
    <div class="bg-juego">
        <!-- Jugador 1: lado izquierdo — disparo deshabilitado hasta que termina el conteo -->
        <div class="left" onclick="">
            <div class="p1">
                <h2 id="jugador1"></h2>
                <div class="vidas1"></div>
                <img src="" id="img-p1">
            </div>
        </div>
        <!-- Jugador 2: lado derecho — disparo deshabilitado hasta que termina el conteo -->
        <div class="right" onclick="">
            <div class="p2">
                <h2 id="jugador2"></h2>
                <div class="vidas2"></div>
                <img src="" id="img-p2">
            </div>
        </div>
    </div>

    <!-- Conteo regresivo -->
    <div class="conteo">
        <div class="no3"><img src="img/3.png"></div>
        <div class="no2"><img src="img/2.png"></div>
        <div class="no1"><img src="img/1.png"></div>
        <div class="msj" onclick="conteo()">¿LISTOS?</div>
    </div>
</body>
<script type="text/javascript" src="funciones.js"></script>
<script type="text/javascript">
    window.addEventListener('load', quitarBG);
    window.addEventListener('load', cargarEscenario);
</script>
</html>
